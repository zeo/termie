[package]
name = "termie"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
arboard = "3.6.1"
bytemuck = { version = "1.25.0", features = ["derive"] }
cosmic-text = "0.19.0"
log = "0.4.30"
pollster = "0.4.0"
portable-pty = "0.9.0"
vte = "0.15.0"
wgpu = "29.0.3"
windows = { version = "0.62.2", features = ["Win32_Foundation", "Win32_Graphics_Dwm", "Win32_System_SystemInformation", "Win32_UI_Shell", "Win32_UI_WindowsAndMessaging"] }
winit = "0.30.13"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
