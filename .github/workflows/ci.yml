name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# one self-hosted Windows runner does the (slow) Rust build for both test and
# lint, so back-to-back pushes used to stack full CI runs behind each other and
# leave the newest checks "Queued" for ages. collapse a ref to its latest run:
# a new push cancels the older in-progress/queued run for the same branch or PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # one Windows job builds the app, runs the unit tests, and runs clippy. on the
  # single self-hosted runner this compiles the (heavy) dependency tree once and
  # lets test + clippy reuse it, instead of two back-to-back cold builds: clippy
  # reuses the already-compiled deps and only re-checks the workspace crate, so
  # it's cheap after the build. formatting is intentionally not enforced (the
  # project keeps its own non-rustfmt style); clippy is the quality gate.
  build:
    runs-on: [self-hosted, windows-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: build
        run: cargo build --all-targets
      - name: test
        run: cargo test
      - name: clippy
        run: cargo clippy --all-targets

  # the same build + test + clippy gate for the linux target. gpu-dependent
  # tests skip themselves when the runner has no adapter, so this passes on a
  # headless vm while still covering the platform layer, pty, and parser
  build-linux:
    runs-on: [self-hosted, linux-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      # the ephemeral linux vms image /usr/bin/rustup without user-level shims,
      # so nothing puts cargo on PATH. ask rustup where the real cargo binary
      # lives and add that toolchain bin dir (plus the shim dir, if it exists)
      - name: cargo on PATH
        run: |
          echo "HOME=$HOME CARGO_HOME=${CARGO_HOME:-<unset>} rustup=$(command -v rustup)"
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          dirname "$(rustup which cargo)" | tee -a "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libwayland-dev libxkbcommon-dev libx11-dev bubblewrap unzip zip
      - name: build
        run: cargo build --all-targets
      - name: test
        run: cargo test
      - name: linux integration tests
        run: cargo test -- --ignored
      - name: clippy
        run: cargo clippy --all-targets

  # security advisory scan of the dependency tree (RUSTSEC database)
  audit:
    runs-on: [self-hosted, linux-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install cargo-audit
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: cargo-audit
      - name: audit
        run: cargo audit
