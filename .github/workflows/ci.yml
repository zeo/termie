name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# one self-hosted Windows runner does the (slow) Rust build for both test and
# lint, so back-to-back pushes used to stack full CI runs behind each other and
# leave the newest checks "Queued" for ages. collapse a ref to its latest run:
# a new push cancels the older in-progress/queued run for the same branch or PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # one Windows job builds the app, runs the unit tests, and runs clippy. on the
  # single self-hosted runner this compiles the (heavy) dependency tree once and
  # lets test + clippy reuse it, instead of two back-to-back cold builds: clippy
  # reuses the already-compiled deps and only re-checks the workspace crate, so
  # it's cheap after the build. formatting is intentionally not enforced (the
  # project keeps its own non-rustfmt style); clippy is the quality gate.
  build:
    # self-hosted runners execute PR code in the host environment, so only branches
    # from this repository may schedule them
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows-vm]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: build
        run: cargo build --all-targets --locked
      - name: test
        run: cargo test --locked
      - name: installer clippy
        run: cargo clippy --locked --manifest-path setup/Cargo.toml --all-targets -- -D warnings
      - name: multi-window drag integration
        shell: powershell
        run: |
          $env:TERMIE_DRIVE_NOW = '1'
          $env:TERMIE_DRIVE_SURFACELESS = '1'
          Get-ChildItem tests\drive\*.txt | Sort-Object Name | ForEach-Object {
            Write-Host "running $($_.Name)"
            & target\debug\termie.exe --shell cmd --drive $_.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "$($_.Name) failed with exit code $LASTEXITCODE"
            }
          }
      - name: clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  # the same build + test + clippy gate for the linux target. gpu-dependent
  # tests skip themselves when the runner has no adapter, so this passes on a
  # headless vm while still covering the platform layer, pty, and parser
  build-linux:
    # self-hosted runners execute PR code in the host environment, so only branches
    # from this repository may schedule them
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux-vm]
    env:
      # runner images may retain a global cargo wrapper after sccache is removed
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: rustup on PATH
        run: |
          cargo_home="${CARGO_HOME:-/cache/cargo}"
          if ! command -v rustup >/dev/null; then
            export CARGO_HOME="$cargo_home"
            curl --proto '=https' --proto-redir '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs | sh -s -- --default-toolchain none -y
          fi
          export PATH="$cargo_home/bin:$PATH"
          echo "CARGO_HOME=$cargo_home" >> "$GITHUB_ENV"
          echo "$cargo_home/bin" >> "$GITHUB_PATH"
          dirname "$(command -v rustup)" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      # the ephemeral linux vms image /usr/bin/rustup without user-level shims,
      # so nothing puts cargo on PATH. ask rustup where the real cargo binary
      # lives and add that toolchain bin dir (plus the shim dir, if it exists)
      - name: cargo on PATH
        run: |
          echo "HOME=$HOME CARGO_HOME=${CARGO_HOME:-<unset>} rustup=$(command -v rustup)"
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          dirname "$(rustup which cargo)" | tee -a "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: system deps
        run: |
          if command -v pkg-config >/dev/null && pkg-config --exists wayland-client xkbcommon x11 && command -v bwrap >/dev/null && command -v unzip >/dev/null && command -v zip >/dev/null; then
            exit 0
          fi
          apt_options=(-o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30)
          sudo timeout 10m apt-get "${apt_options[@]}" update -qq
          sudo timeout 10m apt-get "${apt_options[@]}" install -y -qq pkg-config libwayland-dev libxkbcommon-dev libx11-dev bubblewrap unzip zip
      - name: minimum rust version
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup run 1.89.0 cargo check --locked
      - name: build
        run: cargo build --all-targets --locked
      - name: test
        run: cargo test --locked
      - name: bubblewrap capability
        id: bubblewrap
        run: |
          if bwrap --unshare-all --ro-bind /usr /usr --ro-bind-try /lib /lib --ro-bind-try /lib64 /lib64 --proc /proc --dev /dev --tmpfs /tmp -- /usr/bin/true; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::warning::kernel denies bubblewrap namespaces; sandbox integration test skipped"
          fi
      - name: linux integration tests
        # keep real shell and namespace launches deterministic across runner images
        run: |
          if [[ "${{ steps.bubblewrap.outputs.supported }}" == true ]]; then
            cargo test -- --ignored --test-threads=1
          else
            cargo test -- --ignored --test-threads=1 --skip plugin::sandbox::tests::sandboxed_child_cannot_see_home_or_host_environment
          fi
      - name: clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  # security advisory scan of the dependency tree (RUSTSEC database)
  audit:
    # self-hosted runners execute PR code in the host environment, so only branches
    # from this repository may schedule them
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux-vm]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install cargo-audit
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: cargo-audit
      - name: audit
        run: cargo audit
