name: release

# build, test, and attach the Windows installer when a version tag is pushed.
# the installer is a WiX MSI (wix/main.wxs) named termie-<version>-windows-x64.msi
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # bypass the runner's machine-level sccache wrapper, whose server drops
  # connections mid-build (it killed the first v0.3.0 run); Swatinem/rust-cache
  # still caches dependencies between runs
  RUSTC_WRAPPER: ""

jobs:
  release:
    if: github.actor == 'lintowe'
    runs-on: [self-hosted, windows-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: test
        run: cargo test

      - name: build (release, LTO)
        run: cargo build --release

      - name: build installer (WiX MSI)
        shell: powershell
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          # WiX 3.14 runs on .NET Framework 4.x (present on the runner); the older
          # 3.11 toolset needs .NET 3.5, which the runner doesn't have.
          $wix = Join-Path $env:RUNNER_TEMP 'wix314'
          if (-not (Test-Path "$wix\candle.exe")) {
            Write-Host "downloading WiX 3.14 toolset..."
            $zip = Join-Path $env:RUNNER_TEMP 'wix314-binaries.zip'
            Invoke-WebRequest 'https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip' -OutFile $zip -UseBasicParsing -MaximumRedirection 5
            Expand-Archive $zip -DestinationPath $wix -Force
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $obj = Join-Path $env:RUNNER_TEMP 'termie.wixobj'
          & "$wix\candle.exe" -nologo -arch x64 "-dVersion=$ver" -out $obj wix\main.wxs
          if ($LASTEXITCODE -ne 0) { throw "candle failed with exit code $LASTEXITCODE" }
          & "$wix\light.exe" -nologo -sice:ICE61 -sice:ICE60 -sice:ICE69 -out "dist\termie-$ver-windows-x64.msi" $obj
          if ($LASTEXITCODE -ne 0) { throw "light failed with exit code $LASTEXITCODE" }

      - name: build setup (native installer)
        shell: powershell
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          # stage the payload exactly as it installs: exe + assets + licenses
          $stage = Join-Path $env:RUNNER_TEMP 'termie-payload'
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item target\release\termie.exe $stage\
          Copy-Item assets $stage\assets -Recurse
          Copy-Item LICENSE-MIT, LICENSE-APACHE, THIRDPARTY.md $stage\
          Set-Content (Join-Path $stage 'VERSION') $ver
          $env:TERMIE_PAYLOAD_DIR = $stage
          cargo build --release --manifest-path setup/Cargo.toml
          if ($LASTEXITCODE -ne 0) { throw "setup build failed" }
          Copy-Item setup\target\release\termie-setup.exe "dist\termie-$ver-setup.exe"

      - name: attach to the release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/termie-*-setup.exe
            dist/termie-*-windows-x64.msi
          fail_on_unmatched_files: true
