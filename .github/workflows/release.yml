name: release

# build, test, and attach Windows and Linux packages when a version tag is pushed
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # bypass the runner's machine-level sccache wrapper, whose server drops
  # connections mid-build (it killed the first v0.3.0 run); Swatinem/rust-cache
  # still caches dependencies between runs
  RUSTC_WRAPPER: ""

jobs:
  release:
    if: github.actor == 'zeo'
    runs-on: [self-hosted, windows-vm]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: test
        run: cargo test --locked

      - name: clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: build (release, LTO)
        run: cargo build --release --locked

      - name: fetch conpty host
        # windows powershell 5.1: the runner image carries no pwsh (the first
        # v0.4.0 run died on "pwsh: command not found"); the script is 5.1-clean
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File setup\fetch-conpty.ps1 -Dest target\release

      - name: build installer (WiX MSI)
        shell: powershell
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          # WiX 3.14 runs on .NET Framework 4.x (present on the runner); the older
          # 3.11 toolset needs .NET 3.5, which the runner doesn't have.
          $wix = Join-Path $env:RUNNER_TEMP 'wix314'
          if (-not (Test-Path "$wix\candle.exe")) {
            Write-Host "downloading WiX 3.14 toolset..."
            $zip = Join-Path $env:RUNNER_TEMP 'wix314-binaries.zip'
            Invoke-WebRequest 'https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip' -OutFile $zip -UseBasicParsing -MaximumRedirection 5
            Expand-Archive $zip -DestinationPath $wix -Force
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $obj = Join-Path $env:RUNNER_TEMP 'termie.wixobj'
          & "$wix\candle.exe" -nologo -arch x64 "-dVersion=$ver" -out $obj wix\main.wxs
          if ($LASTEXITCODE -ne 0) { throw "candle failed with exit code $LASTEXITCODE" }
          & "$wix\light.exe" -nologo -sice:ICE61 -sice:ICE60 -sice:ICE69 -out "dist\termie-$ver-windows-x64.msi" $obj
          if ($LASTEXITCODE -ne 0) { throw "light failed with exit code $LASTEXITCODE" }

      - name: build setup (native installer)
        shell: powershell
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          # stage the payload exactly as it installs: exe + assets + licenses
          $stage = Join-Path $env:RUNNER_TEMP 'termie-payload'
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item target\release\termie.exe $stage\
          Copy-Item target\release\conpty.dll, target\release\OpenConsole.exe $stage\
          Copy-Item assets $stage\assets -Recurse
          Copy-Item LICENSE-MIT, LICENSE-APACHE, THIRDPARTY.md $stage\
          Set-Content (Join-Path $stage 'VERSION') $ver
          $env:TERMIE_PAYLOAD_DIR = $stage
          cargo build --release --locked --manifest-path setup/Cargo.toml
          if ($LASTEXITCODE -ne 0) { throw "setup build failed" }
          Copy-Item setup\target\release\termie-setup.exe "dist\termie-$ver-setup.exe"

      - name: attach to the release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/termie-*-setup.exe
            dist/termie-*-windows-x64.msi
          fail_on_unmatched_files: true

  release-linux:
    runs-on: [self-hosted, linux-vm]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: rustup on PATH
        run: |
          cargo_home="${CARGO_HOME:-/cache/cargo}"
          if ! command -v rustup >/dev/null; then
            export CARGO_HOME="$cargo_home"
            curl --proto '=https' --proto-redir '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs | sh -s -- --default-toolchain none -y
          fi
          export PATH="$cargo_home/bin:$PATH"
          echo "CARGO_HOME=$cargo_home" >> "$GITHUB_ENV"
          echo "$cargo_home/bin" >> "$GITHUB_PATH"
          dirname "$(command -v rustup)" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      # the ephemeral linux vms image /usr/bin/rustup without user-level shims,
      # so nothing puts cargo on PATH. ask rustup where the real cargo binary
      # lives and add that toolchain bin dir (plus the shim dir, if it exists)
      - name: cargo on PATH
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: system deps
        run: |
          if command -v pkg-config >/dev/null && pkg-config --exists wayland-client xkbcommon x11 && command -v bwrap >/dev/null && command -v unzip >/dev/null && command -v zip >/dev/null; then
            exit 0
          fi
          apt_options=(-o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30)
          sudo timeout 10m apt-get "${apt_options[@]}" update -qq
          sudo timeout 10m apt-get "${apt_options[@]}" install -y -qq pkg-config libwayland-dev libxkbcommon-dev libx11-dev bubblewrap unzip zip
      - name: test
        run: cargo test --locked
      - name: clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: build
        run: cargo build --release --locked
      - name: package
        run: |
          ver="${GITHUB_REF_NAME#v}"
          root="termie-$ver-linux-x86_64"
          mkdir -p "dist/$root/bin" "dist/$root/share/applications" "dist/$root/share/icons/hicolor/256x256/apps" "dist/$root/share/doc/termie" "dist/$root/share/termie/fonts"
          install -m755 target/release/termie "dist/$root/bin/termie"
          install -m644 packaging/linux/termie.desktop "dist/$root/share/applications/termie.desktop"
          install -m644 assets/icon.png "dist/$root/share/icons/hicolor/256x256/apps/termie.png"
          install -m644 assets/fonts/* "dist/$root/share/termie/fonts/"
          install -m644 LICENSE-MIT LICENSE-APACHE THIRDPARTY.md README.md "dist/$root/share/doc/termie/"
          install -m755 packaging/linux/install.sh packaging/linux/uninstall.sh "dist/$root/"
          tar -C dist -czf "dist/$root.tar.gz" "$root"
      - name: attach to the release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/termie-*-linux-x86_64.tar.gz
          fail_on_unmatched_files: true
